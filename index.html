<!DOCTYPE html>
<html>
<head>
    <title>College Enrollment Form</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            
        }
        .container {
            width: 500px;
            margin: auto;
            border: 2px solid #ccc;
            padding: 30px;
            box-shadow: #ccc 0px 0px 10px;
        }
        h2 {
            text-align: left;
        }
        label {
            display: block;
            margin-top: 20px;
        }
        input, select {
            width: 100%;
            padding: 5px;
            margin-top: 20px;
        }
        .radio-group {
            width: auto;
        }
        .checkbox-group {
            margin-top: 50px;
            
        }
        button {
            margin-top: 50px;
            padding: 10px 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>College Enrollment Form</h2>

    <form>
        <label>First name</label>
        <input type="text" required>

        <label>Middle name</label>
        <input type="text">

        <label>Last name</label>
        <input type="text" required>

        <label>Birthday</label>
        <input type="date" required>

        <label>Birth place</label>
        <input type="text" required>

        <label>Age</label>
        <input type="number" required>

        <label>Year level</label>
        <select required>
            <option>Select Year Level</option>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option>
        </select>

        <label>Course</label>
        <select required>
            <option>Select Course</option>
            <option>ACT (Associate in Computer Technology)</option>
            <option>BSOA (Business Office Administration)</option>
            <option>ENTREP (Entrepreneurship)</option>
            <option>HM (Hospitality Management)</option>
            <option>CT (Computer Technology)</option>
        </select>

        <label>Citizenship</label>
        <input type="text" value="Filipino">

        <label>Sex</label>
        <div class="radio-group">
            <input type="radio" name="sex"> Male
            <input type="radio" name="sex"> Female
        </div>

        <label>Civil Status</label>
        <select required>
            <option>Single</option>
            <option>Married</option>
            <option>Widowed</option>
        </select>

        <label>Region</label>
        <input type="text" required>

        <label>Province</label>
        <input type="text" required>

        <label>City</label>
        <input type="text" required>

        <label>Barangay</label>
        <input type="text" required>

        <label>House No./Street</label>
        <input type="text" required>

        <label>Contact No.</label>
        <input type="text" required>

        <label>Credentials Submitted</label>
        <div class="checkbox-group">
            <input type="checkbox"> Form-138 (High School Card) <br>
            <input type="checkbox"> Form-137<br>
            <input type="checkbox"> Birth Certificate<br>
            <input type="checkbox"> Good Moral Certificate<br>
            <input type="checkbox"> Certificate of Transfer Credentials<br>
            <input type="checkbox"> Transcript of Records<br>
            <input type="checkbox"> Summer Permit / Permit to Cross Enroll<br>
            <input type="checkbox"> Picture<br>
            <input type="checkbox"> PSA / NSO
        </div>

        <button type="submit">Submit</button>
        <button type="reset">Clear</button>
    </form>
</div>

</body>
</html>
