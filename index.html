<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>College Enrollment Form</title>
<style>
  body {
    font-family: 'Arial', sans-serif;
    background-color: #0ac0ee;
    margin: 0;
    padding: 20px;
  }

  .form-container {
    max-width: 800px;
    margin: 0 auto;
    background-color: #dadbd8;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    padding: 30px;
  }

  h2 {
    text-align: center;
    color: #000000;
    margin-bottom: 20px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    margin-bottom: 15px;
  }

  label {
    font-weight: bold;
    margin-bottom: 6px;
    color: #000000;
  }

  input[type="text"],
  input[type="date"],
  select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #bdc3c7;
    font-size: 1em;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus,
  input[type="date"]:focus,
  select:focus {
    border-color: #2980b9;
    box-shadow: 0 0 8px rgba(41, 128, 185, 0.2);
  }

  .radio-group {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-top: 6px;
  }

  .checkbox-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  button {
    background-color: #2980b9;
    color: #fff;
    padding: 12px 25px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1em;
    margin-top: 20px;
    transition: background-color 0.3s ease;
  }

  button:hover {
    background-color: #3498db;
  }

  .submit-btn {
    display: flex;

  }
  
  .Clear-btn{
    display: flex;
    

  }


  select {
    background-color: #ecf0f1;
    appearance: none;
    cursor: pointer;
  }


  input[type="checkbox"] {
    accent-color: #2980b9;
  }

    input[type=""]
    button{
    background-color: rgb(43, 44, 44);
    padding: 10px 50px;
    color: white;
    transition: background-color 0.5s ease;
    }
    button:hover{
        background-color: rgb(124, 6, 6);
        color: rgb(255, 255, 255);
        align-self: center;
        }
</style>
</head>
<body>
<div class="form-container">
  <h2>College Enrollment Form</h2>
  <form>
    <div class="form-group">
      <label for="fname">First Name*</label>
      <input type="text" id="fname" name="fname" required />
    </div>
    <div class="form-group">
      <label for="mname">Middle Name</label>
      <input type="text" id="mname" name="mname" />
    </div>
    <div class="form-group">
      <label for="lname">Last Name*</label>
      <input type="text" id="lname" name="lname" required />
    </div>
    <div class="form-group">
      <label for="bday">Birthday*</label>
      <input type="date" id="bday" name="bday" required />
    </div>
    <div class="form-group">
      <label for="bplace">Birthplace*</label>
      <input type="text" id="bplace" name="bplace" required />
    </div>
    <div class="form-group">
      <label for="age">Age*</label>
      <input type="text" id="age" name="age" required />
    </div>
    <div class="form-group">
      <label for="year-level">Year Level*</label>
      <select id="year-level" name="year-level" required>
        <option value="">Select Year Level</option>
        <option value="1st">First Year</option>
        <option value="2nd">Second Year</option>
        <option value="3rd">Third Year</option>
        <option value="4th">Fourth Year</option>
      </select>
    </div>
    <div class="form-group">
      <label for="course">Course*</label>
      <select id="course" name="course" required>
        <option value="">Select Course</option>
        <option value="ACT">ACT (Associate in Computer Technology)</option>
        <option value="BSOA">BSOA (Business Office Administration)</option>
        <option value="ENTREP">ENTREP (Entrepreneurship)</option>
        <option value="HM">HM (Hospitality Management)</option>
        <option value="CT">CT (Computer Technology)</option>
      </select>
    </div>
    <div class="form-group">
      <label for="citizenship">Citizenship*</label>
      <input type="text" id="citizenship" name="citizenship" value="Filipino" required />
    </div>
    <div class="form-group">
      <label>Sex*</label>
      <div class="radio-group">
        <label><input type="radio" name="sex" value="Male" required /> Male</label>
        <label><input type="radio" name="sex" value="Female" /> Female</label>
      </div>
    </div>
    <div class="form-group">
      <label for="civil">Civil Status*</label>
      <select id="civil" name="civil" required>
        <option value="Single">Single</option>
        <option value="Married">Married</option>
        <option value="Widowed">Widowed</option>
        <option value="Divorced">Divorced</option>
      </select>
    </div>
    <div class="form-group">
      <label for="region">Region*</label>
      <input type="text" id="region" name="region" required />
    </div>
    <div class="form-group">
      <label for="province">Province*</label>
      <input type="text" id="province" name="province" required />
    </div>
    <div class="form-group">
      <label for="city">City*</label>
      <input type="text" id="city" name="city" required />
    </div>
    <div class="form-group">
      <label for="barangay">Barangay*</label>
      <input type="text" id="barangay" name="barangay" required />
    </div>
    <div class="form-group">
      <label for="house">House No./Street*</label>
      <input type="text" id="house" name="house" required />
    </div>
    <div class="form-group">
      <label for="contact">Contact No.*</label>
      <input type="text" id="contact" name="contact" required />
    </div>
    <div class="form-group">
      <label>Credentials Submitted*</label>
      <div class="checkbox-group">
        <label><input type="checkbox" name="credentials" value="Form-138" /> Form-138 (High School Card)</label>
        <label><input type="checkbox" name="credentials" value="Form-137" /> Form-137</label>
        <label><input type="checkbox" name="credentials" value="Birth Certificate" /> Birth Certificate</label>
        <label><input type="checkbox" name="credentials" value="Good Moral Certificate" /> Good Moral Certificate</label>
        <label><input type="checkbox" name="credentials" value="Certificate of Transfer" /> Certificate of Transfer Credentials</label>
        <label><input type="checkbox" name="credentials" value="Transcript" /> Transcript of Records</label>
        <label><input type="checkbox" name="credentials" value="Summer Permit" /> Summer Permit / Permit to Cross Enroll</label>
        <label><input type="checkbox" name="credentials" value="Picture" /> Picture</label>
        <label><input type="checkbox" name="credentials" value="PSA/NSO" /> PSA / NSO</label>
      </div>
    </div>

    <div class="Button">
    <button type="submit">Submit</button>
    <button type="reset">Clear</button>
    </div>
  </form>
</div>
</body>
</html>
